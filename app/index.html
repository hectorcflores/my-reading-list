<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <title>My Reading List</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #111111;
      --muted: #5f6368;
      --line: #d7d7d7;
      --line-strong: #111111;
      --surface: #ffffff;
      --soft: #f6f6f6;
      --issue: #b00020;
      --ok: #0b7a3b;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    a {
      color: inherit;
      overflow-wrap: anywhere;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .shell {
      display: grid;
      gap: 22px;
      width: min(780px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 6vw, 44px);
      line-height: 1;
      letter-spacing: 0;
    }

    .sync-status {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 7px;
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.3;
    }

    .sync-status::before {
      content: "";
      width: 13px;
      height: 13px;
      border-radius: 999px;
      background: var(--issue);
    }

    .sync-status[data-status="synced"]::before,
    .sync-status[data-status="saving"]::before {
      background: var(--ok);
    }

    .sync-status[data-status="saving"]::before {
      animation: pulse 1.1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 0.35;
        transform: scale(0.82);
      }

      50% {
        opacity: 1;
        transform: scale(1.16);
      }
    }

    .composer {
      display: grid;
      gap: 10px;
    }

    label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    textarea {
      width: 100%;
      min-height: 138px;
      resize: vertical;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 14px;
      color: var(--ink);
      background: var(--surface);
      line-height: 1.45;
    }

    textarea:focus {
      outline: 3px solid #cce4ff;
      outline-offset: 2px;
    }

    .actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    .primary {
      min-width: 132px;
      padding: 0 18px;
      background: #111111;
      color: #ffffff;
    }

    .primary:hover {
      background: #303030;
    }

    .message {
      min-height: 20px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .message[data-tone="issue"] {
      color: var(--issue);
    }

    .message[data-tone="ok"] {
      color: var(--ok);
    }

    .list-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 22px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .url-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .url-item {
      display: grid;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      background: var(--surface);
    }

    .url-item time {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .empty {
      margin: 0;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px 14px;
      color: var(--muted);
      background: var(--soft);
      font-weight: 700;
      line-height: 1.4;
    }

    @media (max-width: 540px) {
      .shell {
        padding: 22px 0;
      }

      .topbar,
      .list-header {
        align-items: start;
        flex-direction: column;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .primary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="My Reading List">
    <header class="topbar">
      <h1>My Reading List</h1>
      <div class="sync-status" id="syncStatus" data-status="local">Setup needed</div>
    </header>

    <section class="composer" aria-label="Save URLs">
      <label for="urlInput">Paste URLs</label>
      <textarea id="urlInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="https://example.com/article&#10;https://another-site.com/post"></textarea>
      <div class="actions">
        <p class="message" id="message" aria-live="polite"></p>
        <button class="primary" id="saveButton" type="button">Save</button>
      </div>
    </section>

    <section aria-label="Saved URLs">
      <div class="list-header">
        <h2>Saved URLs</h2>
        <div class="count" id="count">0 links</div>
      </div>
      <ul class="url-list" id="urlList"></ul>
      <p class="empty" id="emptyState">No URLs saved yet.</p>
    </section>
  </main>

  <script>
    const syncConfigStorageKey = "my-reading-list.sync-config.v1";
    const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
    const queryParams = new URLSearchParams(window.location.search);

    const els = {
      syncStatus: document.querySelector("#syncStatus"),
      urlInput: document.querySelector("#urlInput"),
      saveButton: document.querySelector("#saveButton"),
      message: document.querySelector("#message"),
      urlList: document.querySelector("#urlList"),
      emptyState: document.querySelector("#emptyState"),
      count: document.querySelector("#count")
    };

    let syncConfig = null;
    let urls = [];

    function loadSyncConfig() {
      if (typeof localStorage === "undefined") return null;

      try {
        return JSON.parse(localStorage.getItem(syncConfigStorageKey) || "null");
      } catch {
        return null;
      }
    }

    function saveSyncConfig(config) {
      if (typeof localStorage === "undefined") return false;

      try {
        localStorage.setItem(syncConfigStorageKey, JSON.stringify(config));
        return true;
      } catch {
        return false;
      }
    }

    async function configureSyncFromUrl() {
      const supabaseUrl = hashParams.get("sb_url") || queryParams.get("sb_url");
      const supabaseAnonKey = hashParams.get("sb_key") || queryParams.get("sb_key");
      const syncKey = hashParams.get("sync_key") || queryParams.get("sync_key");

      if (!supabaseUrl || !supabaseAnonKey || !syncKey) {
        return loadSyncConfig();
      }

      const config = {
        supabaseUrl: supabaseUrl.replace(/\/$/, ""),
        supabaseAnonKey,
        syncKeyHash: await sha256(syncKey)
      };

      saveSyncConfig(config);
      window.history.replaceState({}, document.title, window.location.pathname);
      return config;
    }

    async function sha256(value) {
      const bytes = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(digest))
        .map((byte) => byte.toString(16).padStart(2, "0"))
        .join("");
    }

    function isSyncEnabled() {
      return Boolean(syncConfig && syncConfig.supabaseUrl && syncConfig.supabaseAnonKey && syncConfig.syncKeyHash);
    }

    function setSyncStatus(label, status = "local") {
      els.syncStatus.textContent = label;
      els.syncStatus.dataset.status = status;
    }

    function setMessage(text, tone = "") {
      els.message.textContent = text;
      if (tone) {
        els.message.dataset.tone = tone;
      } else {
        delete els.message.dataset.tone;
      }
    }

    async function supabaseRpc(functionName, body) {
      if (!isSyncEnabled()) return null;

      const response = await fetch(`${syncConfig.supabaseUrl}/rest/v1/rpc/${functionName}`, {
        method: "POST",
        headers: {
          "apikey": syncConfig.supabaseAnonKey,
          "Authorization": `Bearer ${syncConfig.supabaseAnonKey}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      if (!response.ok) {
        throw new Error(`${functionName} failed: ${response.status}`);
      }

      return response.json();
    }

    function parseUrls(value) {
      const tokens = value
        .split(/\s+/)
        .map((token) => token.trim())
        .filter(Boolean);

      const valid = [];
      const invalid = [];
      const seen = new Set();

      tokens.forEach((token) => {
        const normalized = normalizeUrl(token);
        if (!normalized) {
          invalid.push(token);
          return;
        }

        if (!seen.has(normalized)) {
          seen.add(normalized);
          valid.push(normalized);
        }
      });

      return { valid, invalid };
    }

    function normalizeUrl(value) {
      try {
        const url = new URL(value);
        if (url.protocol !== "http:" && url.protocol !== "https:") return null;
        return url.href;
      } catch {
        return null;
      }
    }

    function formatCreatedAt(value) {
      return new Intl.DateTimeFormat(undefined, {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(new Date(value));
    }

    function renderList() {
      els.count.textContent = `${urls.length} ${urls.length === 1 ? "link" : "links"}`;
      els.emptyState.hidden = urls.length > 0;
      els.urlList.innerHTML = urls.map((item) => {
        const safeUrl = escapeHtml(item.url);
        const safeDate = escapeHtml(formatCreatedAt(item.created_at));
        return `
          <li class="url-item">
            <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeUrl}</a>
            <time datetime="${escapeHtml(item.created_at)}">${safeDate}</time>
          </li>
        `;
      }).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadRemoteUrls() {
      if (!isSyncEnabled()) {
        setSyncStatus("Setup needed", "local");
        urls = [];
        renderList();
        return false;
      }

      try {
        setSyncStatus("Syncing", "saving");
        urls = await supabaseRpc("list_reading_urls", {
          p_sync_key_hash: syncConfig.syncKeyHash
        });
        renderList();
        setSyncStatus("Synced", "synced");
        return true;
      } catch (error) {
        console.warn(error);
        setSyncStatus("Sync issue", "issue");
        return false;
      }
    }

    async function saveUrls() {
      const { valid, invalid } = parseUrls(els.urlInput.value);

      if (valid.length === 0) {
        setMessage(invalid.length > 0 ? "Paste a valid http:// or https:// URL." : "Paste at least one URL.", "issue");
        return;
      }

      if (!isSyncEnabled()) {
        setSyncStatus("Setup needed", "local");
        setMessage("Sync setup is needed before URLs can be saved.", "issue");
        return;
      }

      els.saveButton.disabled = true;
      setSyncStatus("Saving", "saving");
      setMessage("Saving...", "");

      try {
        await Promise.all(valid.map((url) => supabaseRpc("create_reading_url", {
          p_sync_key_hash: syncConfig.syncKeyHash,
          p_url: url
        })));
        els.urlInput.value = invalid.join("\n");
        await loadRemoteUrls();

        const invalidMessage = invalid.length > 0
          ? ` ${invalid.length} invalid ${invalid.length === 1 ? "entry was" : "entries were"} left in the box.`
          : "";
        setMessage(`Saved ${valid.length} ${valid.length === 1 ? "URL" : "URLs"}.${invalidMessage}`, invalid.length > 0 ? "issue" : "ok");
      } catch (error) {
        console.warn(error);
        setSyncStatus("Sync issue", "issue");
        setMessage("Could not save. Check Supabase setup and try again.", "issue");
      } finally {
        els.saveButton.disabled = false;
      }
    }

    els.saveButton.addEventListener("click", saveUrls);
    els.urlInput.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        saveUrls();
      }
    });

    window.addEventListener("focus", () => {
      loadRemoteUrls();
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) loadRemoteUrls();
    });

    async function init() {
      syncConfig = await configureSyncFromUrl();
      setSyncStatus(isSyncEnabled() ? "Syncing" : "Setup needed", isSyncEnabled() ? "saving" : "local");
      await loadRemoteUrls();
    }

    init();
  </script>
</body>
</html>
